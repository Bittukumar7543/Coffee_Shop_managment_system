<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login Form</title>
    <link rel="icon" href="./images/cofeeicon.jpeg">
    <link rel="stylesheet" href="style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.2/css/all.min.css">
</head>
<div class="Signup-box">
    <div class="Signup-body">
        <div class="text-content">
         <h2>Sign up...</h2>
        </div>
        <div class="Signup">
            <form action="connect.php" method="post" class="login">
            <div class="Signup-content">
                <input type="text" id="Username" name="username" required>
                <span></span>
                <label><span>*</span>Username</label>
            </div>
            <div class="Signup-content">
                <input type="email" id="email" name="email" required>
                <span></span>
                <label><span>*</span>Email</label>
            </div>
            <div class="Signup-content">
                <input type="password" id="password" name="password" required>
                <span></span>
                <label><span>*</span>Password</label>
            </div>
            <div class="Signup-content">
                <input type="password" id="confirmpassword" name="confirmpassword" required>
                <span></span>
                <label><span>*</span>Confirm password</label>
            </div>
             <button type="submit" class="btn">Submit</button>
             <a href="Signin.html"><input type="button">Signin</a>
             </div>
            </form>

             <div class="popup" id="popup">
                <img src="./images/tickicon.png">
                <h2>Thank you!</h2>
                <p>Your details has been Sucessfully Submited.Thank!</p>
                <button type="button" onclick="closepopup()">Ok</button>
             </div>
            </div>
</div>
<script>
    let popup=document.getElementById("popup");
    function openpopup(){
        popup.classList.add("open-popup");
    }
    function closepopup(){
        popup.classList.remove("open-popup");
    }


    function validateForm() {
        var username = document.getElementById("username").value;
        var email = document.getElementById("email").value;
        var password = document.getElementById("password").value;
        var errorMessage = document.getElementById("errorMessage");

        // Check if any field is empty
        if (username === "" || email === "" || password === "") {
            errorMessage.textContent = "All fields are required.";
            return false; // Prevent form submission
        } else {
            // If all fields are filled, show popup
            alert(openpopup());
            return true; // Allow form submission
        }
    }
</script>
</body>
</html>
